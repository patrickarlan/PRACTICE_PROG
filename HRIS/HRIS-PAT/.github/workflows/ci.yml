name: Fullstack CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  backend:
    name: Backend Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: hris_test
          POSTGRES_PASSWORD: password
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_CONNECTION_STRING: "Host=localhost;Database=hris_test;Username=postgres;Password=password"
      JWT_SECRET: "ci_test_secret_key_at_least_32_chars"
      JWT_ISSUER: "hris_test"
      JWT_AUDIENCE: "hris_test"
      ENABLE_SWAGGER: "false"

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore dependencies
        run: dotnet restore
        working-directory: backend

      - name: Build
        run: dotnet build --no-restore
        working-directory: backend

      - name: Install dotnet-ef
        run: dotnet tool install --global dotnet-ef

      - name: Run Migrations
        run: |
          export PATH="$PATH:$HOME/.dotnet/tools"
          dotnet ef database update
        working-directory: backend

      - name: Run Tests
        run: dotnet test --no-build --verbosity normal
        working-directory: backend.Tests

      - name: Smoke Test (Health Check)
        run: |
          dotnet run --no-build &
          pid=$!
          echo "Waiting for app to be healthy at http://localhost:5107/health..."
          for i in {1..20}; do
            if curl -s http://localhost:5107/health | grep -q "Healthy"; then
              echo "App is healthy!"
              kill $pid
              exit 0
            fi
            sleep 3
          done
          echo "App failed to become healthy within timeout"
          kill $pid
          exit 1
        working-directory: backend

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: hris/package-lock.json     

      - name: Install dependencies
        run: npm ci
        working-directory: hris

      - name: Build
        run: npm run build
        working-directory: hris
